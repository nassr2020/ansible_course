- name: create user
  tags: always
  ansible.builtin.user:
    name: simone2
    groups: root

- name: add sudoers file for simone2
  tags: always
  ansible.builtin.copy:
    src: sudoer_simone2
    dest: /etc/sudoers.d/simone2
    owner: root
    group: root
    mode: 0440

- name: add ssh key for simone2 user
  tags: always
  ansible.builtin.authorized_key:
    user: simone2
    key: "ssh-rsa  root@ubuntu-ws"
